        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeacherResponse'
          description: ''
