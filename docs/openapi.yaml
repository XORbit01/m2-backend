openapi: 3.0.3
info:
  title: M2 Backend API
  version: 1.0.0
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/admin/teachers/:
    post:
      operationId: v1_auth_admin_teachers_create
      description: |-
        POST /api/v1/auth/admin/teachers/
        Admin only. Creates User + Person + TeacherProfile.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeacherResponse'
          description: ''
  /api/v1/auth/admin/users/:
    post:
      operationId: v1_auth_admin_users_create
      description: |-
        POST /api/v1/admin/users/
        Admin only. Creates User + Person with email and temporary password.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: |-
        POST /api/v1/auth/login/
        Email + password. On success: session login + registration status.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
            schema:
              $ref: '#/components/schemas/LoginResponse'
          description: ''
  /api/v1/auth/register/guest/:
    post:
      operationId: v1_auth_register_guest_create
      description: |-
        POST /api/v1/auth/register/guest/
        Public. Creates User + Person + GuestProfile. Client should then call login.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GuestRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GuestRegisterRequest'
        required: true
      security: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestRegisterResponse'
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: |-
        GET /api/v1/auth/me/
        Requires auth. Returns current user, registration status, roles, and
        role-based profile (student, teacher, coordinator).
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: ''
  /api/v1/auth/profile/:
    get:
      operationId: v1_auth_profile_retrieve
      description: |-
        GET /api/v1/auth/profile/
        Returns basic profile settings for the authenticated user.

        PUT /api/v1/auth/profile/
        Updates basic profile settings (first_name, last_name, avatar) for the authenticated user.
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSettingsResponse'
          description: ''
    put:
      operationId: v1_auth_profile_update
      description: |-
        GET /api/v1/auth/profile/
        Returns basic profile settings for the authenticated user.

        PUT /api/v1/auth/profile/
        Updates basic profile settings (first_name, last_name, avatar) for the authenticated user.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileSettingsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProfileSettingsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfileSettingsRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSettingsResponse'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/community/posts/:
    get:
      operationId: community_posts_list
      description: |-
        GET /api/v1/community/posts/
        List all community posts with audiences, comment counts, and reactions.

        POST /api/v1/community/posts/
        Create a new community post with audiences.
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPostListResponse'
          description: ''
    post:
      operationId: v1_community_posts_create
      description: |-
        GET /api/v1/community/posts/
        List all community posts with audiences, comment counts, and reactions.

        POST /api/v1/community/posts/
        Create a new community post with audiences.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityCreatePostRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommunityCreatePostRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommunityCreatePostRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityCreatePostResponse'
          description: ''
  /api/v1/community/posts/{post_id}/:
    get:
      operationId: community_posts_retrieve
      description: |-
        GET /api/v1/community/posts/<post_id>/
        Retrieve a single post with audiences, comment count, and reactions.
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPostListResponse'
          description: ''
  /api/v1/community/posts/{post_id}/comments/:
    get:
      operationId: v1_community_posts_comments_retrieve
      description: |-
        GET /api/v1/community/posts/<post_id>/comments/
        List comments for a post.
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityCommentsListResponse'
          description: ''
  /api/v1/community/posts/{post_id}/comments/create/:
    post:
      operationId: v1_community_posts_comments_create_create
      description: |-
        POST /api/v1/community/posts/<post_id>/comments/
        Create a comment on a post.
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityCreateCommentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommunityCreateCommentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommunityCreateCommentRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityCreateCommentResponse'
          description: ''
  /api/v1/community/posts/{post_id}/reactions/:
    post:
      operationId: v1_community_posts_reactions_create
      description: |-
        POST /api/v1/community/posts/<post_id>/reactions/
        Set or update the current user's reaction on a post.

        DELETE /api/v1/community/posts/<post_id>/reactions/
        Remove the current user's reaction on a post (if any).
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityPostReactionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommunityPostReactionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommunityPostReactionRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPostReactionResponse'
          description: ''
    delete:
      operationId: v1_community_posts_reactions_destroy
      description: |-
        POST /api/v1/community/posts/<post_id>/reactions/
        Set or update the current user's reaction on a post.

        DELETE /api/v1/community/posts/<post_id>/reactions/
        Remove the current user's reaction on a post (if any).
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/experience/me/:
    get:
      operationId: v1_experience_me_retrieve
      description: |-
        GET /api/v1/experience/me/
        List all experience records (internships, PhD, work, other) for the authenticated person.

        POST /api/v1/experience/me/
        Create a new experience record for the authenticated person.
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyExperiencesListResponse'
          description: ''
    post:
      operationId: v1_experience_me_create
      description: |-
        GET /api/v1/experience/me/
        List all experience records (internships, PhD, work, other) for the authenticated person.

        POST /api/v1/experience/me/
        Create a new experience record for the authenticated person.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyExperienceCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MyExperienceCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MyExperienceCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyExperienceCreateResponse'
          description: ''
  /api/v1/experience/me/{experience_id}/:
    put:
      operationId: v1_experience_me_update
      description: |-
        PUT /api/v1/experience/me/<experience_id>/
        Update an experience that belongs to the authenticated person.

        DELETE /api/v1/experience/me/<experience_id>/
        Delete an experience that belongs to the authenticated person.
      parameters:
      - in: path
        name: experience_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyExperienceCreateResponse'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MyExperienceCreateResponse'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MyExperienceCreateResponse'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyExperienceCreateResponse'
          description: ''
    delete:
      operationId: v1_experience_me_destroy
      description: |-
        PUT /api/v1/experience/me/<experience_id>/
        Update an experience that belongs to the authenticated person.

        DELETE /api/v1/experience/me/<experience_id>/
        Delete an experience that belongs to the authenticated person.
      parameters:
      - in: path
        name: experience_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/programs/coordinator/cohorts/:
    get:
      operationId: v1_programs_coordinator_cohorts_retrieve
      description: |-
        GET /api/v1/programs/coordinator/cohorts/
        Returns cohorts for programs in coordinator's major(s).
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorCohortsListResponse'
          description: ''
  /api/v1/programs/coordinator/offerings/:
    get:
      operationId: v1_programs_coordinator_offerings_retrieve
      description: |-
        GET /api/v1/programs/coordinator/offerings/
        Returns course offerings for programs in the coordinator's major(s).
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorOfferingsListResponse'
          description: ''
  /api/v1/programs/coordinator/offerings/{offering_id}/assign/:
    post:
      operationId: v1_programs_coordinator_offerings_assign_create
      description: |-
        POST /api/v1/programs/coordinator/offerings/<offering_id>/assign/
        Assign teacher to a course offering. Coordinator must manage that major.
      parameters:
      - in: path
        name: offering_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoordinatorAssignTeacherRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CoordinatorAssignTeacherRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CoordinatorAssignTeacherRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorAssignTeacherResponse'
          description: ''
  /api/v1/programs/coordinator/students/:
    get:
      operationId: v1_programs_coordinator_students_retrieve
      description: |-
        GET /api/v1/programs/coordinator/students/
        Returns students enrolled in coordinator's major(s).
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorStudentsListResponse'
          description: ''
  /api/v1/programs/coordinator/teachers/:
    get:
      operationId: v1_programs_coordinator_teachers_retrieve
      description: |-
        GET /api/v1/programs/coordinator/teachers/
        Returns all teachers (for coordinator to choose when assigning).
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorTeachersListResponse'
          description: ''
  /api/v1/programs/teacher/courses/{offering_id}/students/:
    get:
      operationId: v1_programs_teacher_courses_students_retrieve
      description: |-
        GET /api/v1/programs/teacher/courses/<offering_id>/students/
        Returns students enrolled in the course offering's cohort.
        Teacher must be assigned to that offering.
      parameters:
      - in: path
        name: offering_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherCourseStudentsResponse'
          description: ''
  /api/v1/registration/answer/:
    post:
      operationId: v1_registration_answer_create
      description: |-
        POST /api/v1/registration/answer/
        Requires auth. Submit answer for current step; advances state and persists payload.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationAnswerRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationAnswerRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationAnswerRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationAnswerResponse'
          description: ''
  /api/v1/registration/coordinator/{session_id}/accept/:
    post:
      operationId: v1_registration_coordinator_accept_create
      description: |-
        POST /api/v1/registration/coordinator/<session_id>/accept/
        Requires auth. Coordinator for the session's major can accept (final stage).
      parameters:
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorAcceptResponse'
          description: ''
  /api/v1/registration/coordinator/{session_id}/reject/:
    post:
      operationId: v1_registration_coordinator_reject_create
      description: |-
        POST /api/v1/registration/coordinator/<session_id>/reject/
        Requires auth. Coordinator for the session's major can reject; session is deleted.
      parameters:
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorRejectResponse'
          description: ''
  /api/v1/registration/coordinator/pending/:
    get:
      operationId: v1_registration_coordinator_pending_retrieve
      description: |-
        GET /api/v1/registration/coordinator/pending/
        Requires auth. Returns submitted registrations for majors the current user coordinates.
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorPendingListResponse'
          description: ''
  /api/v1/registration/state/:
    get:
      operationId: v1_registration_state_retrieve
      description: |-
        GET /api/v1/registration/state/
        Requires auth. Returns current registration step and payload for the logged-in user's person.
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationStateResponse'
          description: ''
  /api/v1/registration/submit/:
    post:
      operationId: v1_registration_submit_create
      description: |-
        POST /api/v1/registration/submit/
        Requires auth. Final submit when current_step is SUBMIT. Sets status to SUBMITTED.
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationSubmitResponse'
          description: ''
  /api/v1/supervision/student/requests/:
    get:
      operationId: v1_supervision_student_requests_retrieve
      description: |-
        GET /api/v1/supervision/student/requests/
        List supervision requests for the authenticated student.

